name: Deploy NuGet package

# Publishes the 4dotnet-csharp-style-guide MCP server to NuGet.org as a .NET tool.
# The package version is generated by GitVersion so every published build is unique.
# Authentication uses NuGet Trusted Publishing (OIDC) — no long-lived API key is stored.
# A matching trusted publishing policy must exist on nuget.org, scoped to this
# repository, the workflow file "deploy-nuget-package.yml" and the "production" environment.

on:
  push:
    branches: [main]
    paths:
      - "src/**"        # only run when the server source changes
  workflow_dispatch:

env:
  PROJECT: src/4dotnet-csharp-style-guide/4dotnet-csharp-style-guide.csproj

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # required for the GitHub OIDC token used by Trusted Publishing
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # GitVersion needs the full history and tags

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: "6.4.x"

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore "$PROJECT"

      - name: Build
        run: dotnet build "$PROJECT" --configuration Release --no-restore -p:Version=${{ steps.gitversion.outputs.semVer }}

      - name: Pack
        run: >-
          dotnet pack "$PROJECT"
          --configuration Release
          --no-build
          --output "${{ runner.temp }}/nupkg"
          -p:Version=${{ steps.gitversion.outputs.semVer }}

      - name: NuGet login (Trusted Publishing → short-lived API key)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}   # nuget.org account/profile name, not an email

      - name: Push to NuGet.org
        run: >-
          dotnet nuget push "${{ runner.temp }}/nupkg/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
